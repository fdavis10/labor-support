# Production. Подготовьте .env и backend/.env из *.production.
# Запуск одной командой:
#   docker compose -f docker-compose.production.yml up -d --build
# Создание суперпользователя (контейнеры должны быть запущены):
#   docker compose -f docker-compose.production.yml exec -T backend env \
#     DJANGO_SUPERUSER_USERNAME=admin DJANGO_SUPERUSER_PASSWORD=secret \
#     python manage.py create_superuser_if_missing

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labor_support}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-labor_support}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DB_ENGINE: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-labor_support}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - backend_static:/var/www/backend-static:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./docker/acme-challenge:/var/www/acme:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_static:
